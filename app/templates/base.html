<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="MacroHard - Security Analysis Platform">
    <title>{% block title %}MacroHard{% endblock %}</title>
    
    <style>
        :root {
            --bg: #fafafa;
            --bg-elevated: #ffffff;
            --bg-sidebar: #f5f5f5;
            --text: #171717;
            --text-secondary: #525252;
            --text-muted: #737373;
            --border: #e5e5e5;
            --border-strong: #d4d4d4;
            --accent: #171717;
            --accent-hover: #404040;
            --critical: #dc2626;
            --high: #ea580c;
            --medium: #ca8a04;
            --low: #16a34a;
            --radius: 8px;
            --radius-lg: 12px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        /* Layout */
        .app {
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 240px;
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
        }

        .sidebar-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .sidebar-logo {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            font-weight: 700;
            letter-spacing: 0.05em;
            text-transform: none;
            font-style: italic;
            color: var(--text);
            text-decoration: none;
            padding: 2px 8px;
        }

        .sidebar-nav {
            flex: 1;
            padding: 16px 12px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 16px;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-secondary);
            text-decoration: none;
            border-radius: var(--radius);
            margin-bottom: 4px;
            transition: all 0.15s ease;
        }

        .nav-item:hover {
            background: var(--bg);
            color: var(--text);
        }

        .nav-item.active {
            background: var(--bg-elevated);
            color: var(--text);
            box-shadow: 0 1px 2px rgba(0,0,0,0.04);
        }

        .sidebar-footer {
            padding: 16px;
            border-top: 1px solid var(--border);
        }

        .sidebar-section-title {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            font-weight: 600;
            padding: 8px 16px 6px;
        }

        .user-menu-wrap {
            position: relative;
        }

        .user-menu {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            border-radius: var(--radius);
            cursor: pointer;
            transition: all 0.15s ease;
            border: 1px solid transparent;
            background: transparent;
            text-align: left;
            color: inherit;
            font-family: inherit;
        }

        .user-menu:hover,
        .user-menu-wrap.open .user-menu {
            background: var(--bg);
            border-color: var(--border);
        }

        .user-dropdown {
            position: absolute;
            left: 0;
            right: 0;
            bottom: calc(100% + 8px);
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
            display: none;
            overflow: hidden;
            z-index: 10;
        }

        .user-menu-wrap.open .user-dropdown {
            display: block;
        }

        .dropdown-item {
            display: block;
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--border);
            padding: 10px 12px;
            font-size: 13px;
            color: var(--text-secondary);
            text-align: left;
            text-decoration: none;
            cursor: pointer;
        }

        .dropdown-item:last-child {
            border-bottom: none;
        }

        .dropdown-item:hover {
            background: var(--bg);
            color: var(--text);
        }

        .dropdown-item.logout {
            color: var(--critical);
        }

        .user-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--accent);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 600;
        }

        .user-info { flex: 1; }
        .user-name { font-size: 14px; font-weight: 500; }
        .user-email { font-size: 12px; color: var(--text-muted); }

        /* Main Content */
        .main {
            flex: 1;
            margin-left: 240px;
            padding: 32px 40px;
        }

        /* Header */
        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 32px;
        }

        .page-title h1 {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        .page-title p {
            font-size: 14px;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        /* Buttons */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            font-size: 14px;
            font-weight: 500;
            border-radius: var(--radius);
            border: none;
            cursor: pointer;
            transition: all 0.15s ease;
            text-decoration: none;
        }

        .btn-primary {
            background: var(--accent);
            color: white;
        }

        .btn-primary:hover { background: var(--accent-hover); }

        .btn-secondary {
            background: var(--bg-elevated);
            color: var(--text);
            border: 1px solid var(--border-strong);
        }

        .btn-secondary:hover { background: var(--bg); }

        .btn-danger {
            background: var(--critical);
            color: white;
        }

        .btn-danger:hover { background: #b91c1c; }

        /* Cards */
        .card {
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            overflow: hidden;
        }

        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
        }

        .card-title {
            font-size: 14px;
            font-weight: 600;
        }

        .card-meta {
            font-size: 13px;
            color: var(--text-muted);
        }

        .card-body { padding: 8px 0; }

        /* Stats */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 20px;
            transition: all 0.15s ease;
        }

        .stat-card:hover { border-color: var(--border-strong); }

        .stat-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .stat-label {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }

        .stat-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .stat-indicator.critical { background: var(--critical); }
        .stat-indicator.high { background: var(--high); }
        .stat-indicator.medium { background: var(--medium); }
        .stat-indicator.low { background: var(--low); }

        .stat-value {
            font-size: 32px;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        .stat-value.critical { color: var(--critical); }
        .stat-value.high { color: var(--high); }
        .stat-value.medium { color: var(--medium); }
        .stat-value.low { color: var(--low); }

        /* Severity Tags */
        .severity-tag {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            font-size: 12px;
            font-weight: 500;
            border-radius: 100px;
            text-transform: uppercase;
            letter-spacing: 0.02em;
        }

        .severity-tag.critical { background: rgba(220, 38, 38, 0.1); color: var(--critical); }
        .severity-tag.high { background: rgba(234, 88, 12, 0.1); color: var(--high); }
        .severity-tag.medium { background: rgba(202, 138, 4, 0.1); color: var(--medium); }
        .severity-tag.low { background: rgba(22, 163, 74, 0.1); color: var(--low); }

        .severity-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
        }

        .severity-dot.critical { background: var(--critical); }
        .severity-dot.high { background: var(--high); }
        .severity-dot.medium { background: var(--medium); }
        .severity-dot.low { background: var(--low); }

        /* Tables */
        .table-container { overflow-x: auto; }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            padding: 12px 20px;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.03em;
            border-bottom: 1px solid var(--border);
            background: var(--bg);
        }

        td {
            padding: 14px 20px;
            font-size: 14px;
            border-bottom: 1px solid var(--border);
        }

        tr:hover td { background: var(--bg); }
        tr:last-child td { border-bottom: none; }

        code {
            font-family: 'SF Mono', Monaco, monospace;
            font-size: 12px;
            padding: 4px 8px;
            background: var(--bg);
            border-radius: 4px;
            color: var(--text-secondary);
        }

        /* Status Badge */
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            font-size: 12px;
            font-weight: 500;
            border-radius: 100px;
            background: var(--bg);
            color: var(--text-secondary);
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: currentColor;
        }

        /* Alerts */
        .alert {
            padding: 12px 16px;
            border-radius: var(--radius);
            margin-bottom: 16px;
            font-size: 14px;
        }

        .alert-success {
            background: rgba(22, 163, 74, 0.1);
            color: #15803d;
            border: 1px solid rgba(22, 163, 74, 0.2);
        }

        .alert-error {
            background: rgba(220, 38, 38, 0.1);
            color: #b91c1c;
            border: 1px solid rgba(220, 38, 38, 0.2);
        }

        .alert-info {
            background: rgba(59, 130, 246, 0.1);
            color: #1d4ed8;
            border: 1px solid rgba(59, 130, 246, 0.2);
        }

        /* Forms */
        .form-group { margin-bottom: 20px; }

        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .form-input {
            width: 100%;
            padding: 12px 16px;
            font-size: 14px;
            font-family: inherit;
            border: 1px solid var(--border-strong);
            border-radius: var(--radius);
            background: var(--bg-elevated);
            color: var(--text);
            transition: all 0.15s ease;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--accent);
        }

        .form-input::placeholder { color: var(--text-muted); }

        .form-error {
            font-size: 13px;
            color: var(--critical);
            margin-top: 6px;
        }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.4);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.active { display: flex; }

        .modal {
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            width: 100%;
            max-width: 440px;
            margin: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }

        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px;
            border-bottom: 1px solid var(--border);
        }

        .modal-title { font-size: 16px; font-weight: 600; }

        .modal-close {
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px;
            color: var(--text-muted);
            font-size: 20px;
        }

        .modal-close:hover { color: var(--text); }

        .modal-body { padding: 20px; }

        .modal-footer {
            display: flex;
            gap: 12px;
            padding: 16px 20px;
            border-top: 1px solid var(--border);
        }

        .modal-footer .btn { flex: 1; }

        /* Breadcrumb */
        .breadcrumb {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .breadcrumb a {
            color: var(--text-muted);
            text-decoration: none;
        }

        .breadcrumb a:hover { color: var(--text); }

        .breadcrumb-separator { color: var(--text-muted); }

        .breadcrumb-current { color: var(--text); }

        /* Project List */
        .project-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 20px;
            text-decoration: none;
            color: inherit;
            border-bottom: 1px solid var(--border);
            transition: background 0.15s ease;
        }

        .project-item:last-child { border-bottom: none; }
        .project-item:hover { background: var(--bg); }

        .project-info h4 {
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 2px;
        }

        .project-info p {
            font-size: 13px;
            color: var(--text-muted);
        }

        .project-badges {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 24px;
            height: 24px;
            padding: 0 8px;
            font-size: 12px;
            font-weight: 600;
            border-radius: 100px;
            color: white;
        }

        .badge.critical { background: var(--critical); }
        .badge.high { background: var(--high); }
        .badge.medium { background: var(--medium); }
        .badge.low { background: var(--low); }

        /* Responsive */
        @media (max-width: 1024px) {
            .sidebar { display: none; }
            .main { margin-left: 0; padding: 24px; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
        }

        @media (max-width: 640px) {
            .stats-grid { grid-template-columns: 1fr; }
            .page-header { flex-direction: column; gap: 16px; align-items: flex-start; }
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    {% block content %}{% endblock %}
    
    {% block extra_js %}{% endblock %}
</body>
</html>
