{% if current_user.is_authenticated %}
<details class="user-menu-wrap" data-user-menu-wrap>
    <summary class="user-menu" data-user-menu-trigger aria-haspopup="true" aria-expanded="false">
        <div class="user-avatar">{{ current_user.username[0]|upper }}</div>
        <div class="user-info">
            <div class="user-name">{{ current_user.username }}</div>
            <div class="user-email">{{ current_user.email }}</div>
        </div>
    </summary>
    <div class="user-dropdown" data-user-dropdown>
        <a href="/dashboard/insights" class="dropdown-item">Account Settings</a>
        <form method="POST" action="/auth/logout">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <button type="submit" class="dropdown-item logout">Logoff</button>
        </form>
    </div>
</details>
{% endif %}
